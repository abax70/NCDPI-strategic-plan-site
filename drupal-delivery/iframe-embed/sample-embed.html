  NCDPI Strategic Plan Dashboard — iframe embed sample

  Paste everything inside <body>...</body> below into the Drupal

  of the dashboard before publishing.

  This file is illustrative; it is NOT the thing to paste. Only

  =================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sample iframe embed (illustrative only)</title>
</head>
<body>

<h1>Strategic Plan — Best in the Nation</h1>
<p>Track North Carolina's progress toward the state's 2030 education goals.</p>

<!-- =================== PASTE FROM HERE =================== -->

<iframe
  class="sp-dashboard-iframe"
  src="https://abax70.github.io/NCDPI-strategic-plan-site/"
  title="NCDPI Strategic Plan — Best in the Nation Dashboard"
  width="100%"
  height="600"
  style="border: 0; display: block; width: 100%; margin: 0 auto;"
  loading="lazy"
  referrerpolicy="no-referrer-when-downgrade">
</iframe>

<!-- Optional: auto-height listener. Remove this entire <script>
     block if your CMS doesn't allow inline JS; the iframe will
     fall back to the fixed height set above. See README.md for
     alternatives. -->
<script>
(function () {
  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || d.type !== 'sp-dashboard-height') return;
    if (typeof d.height !== 'number' || d.height < 200) return;
    var iframes = document.querySelectorAll('iframe.sp-dashboard-iframe');
    for (var i = 0; i < iframes.length; i++) {
      if (iframes[i].contentWindow === e.source) {
        iframes[i].style.height = d.height + 'px';
        break;
      }
    }
  });
})();
</script>

<!-- ==================== PASTE TO HERE ==================== -->

</body>
</html>
