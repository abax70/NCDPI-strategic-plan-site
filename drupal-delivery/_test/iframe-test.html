<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>[iframe test] Strategic Plan</title>
<style>
  body { font-family: Georgia, serif; margin: 0; background: #eee; }
  .chrome { background: #222; color: #fff; padding: 16px 24px; }
  .diagnostics { background: #ffe; padding: 8px 24px; border-bottom: 1px solid #dd7; font-size: 13px; font-family: monospace; }
  .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
  iframe.sp-dashboard-iframe { border: 0; display: block; width: 100%; height: 600px; }
  .footer { background: #111; color: #888; padding: 16px 24px; margin-top: 40px; }
</style>
</head>
<body>
<header class="chrome"><strong>[host-sim]</strong> Strategic Plan landing in an iframe</header>
<div class="diagnostics" id="diag">Waiting for height messages...</div>
<div class="container">
  <iframe class="sp-dashboard-iframe"
          src="/index.html"
          title="NCDPI Strategic Plan — Best in the Nation Dashboard"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>
<footer class="footer">[host-sim footer] &copy; 2026 NCDPI</footer>

<script>
/* Parent-side listener (same code the webmaster would paste). */
(function () {
  var diag = document.getElementById('diag');
  var msgCount = 0;
  window.addEventListener('message', function (e) {
    var d = e.data;
    if (!d || d.type !== 'sp-dashboard-height') return;
    if (typeof d.height !== 'number' || d.height < 200) return;
    msgCount++;
    var iframes = document.querySelectorAll('iframe.sp-dashboard-iframe');
    for (var i = 0; i < iframes.length; i++) {
      if (iframes[i].contentWindow === e.source) {
        iframes[i].style.height = d.height + 'px';
        diag.textContent = 'Height messages: ' + msgCount + ' | current iframe height: ' + d.height + 'px';
        break;
      }
    }
  });
})();
</script>
</body>
</html>
